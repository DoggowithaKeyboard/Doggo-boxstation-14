- type: entity
  id: MobIPC
  parent: PlayerSiliconHumanoidBase
  name: Urist McPositronic
  suffix: UR1ST, Box # Box Change
  description: A positronic brain in a metal body.
  components:
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: true
  - type: ItemSlots
    slots:
      cell_slot:
        locked: true
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
  - type: BatterySlotRequiresLock
    itemSlot: cell_slot
  # - type: EncryptionHolderRequiresLock # Box Change, no internal radio
  - type: SiliconEmitSoundOnDrained
    sound: "/Audio/Weapons/Guns/EmptyAlarm/smg_empty_alarm.ogg" # SOMEONE PLEASE FIND A BETTER SOUND FOR THIS.
    minInterval: 99
    maxInterval: 99
    popUp: "silicon-power-low"
  - type: Lock
    locked: true
    lockOnClick: false
    unlockOnClick: false
    lockTime: 5
    unlockTime: 5
    breakOnAccessBreaker: false # DeltaV - cant be emagged
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: hugging-success-generic
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: hugging-success-generic-others
  - type: NpcFactionMember
    factions:
      - NanoTrasen
  - type: StandingState
  - type: MobState
    allowedStates:
      - Alive
      - Critical
      - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      119.999: Critical # TO make it almost impossible
      120: Dead
    stateAlertDict:
      Alive: BorgHealth
      Critical: BorgCrit
      Dead: BorgDead
  - type: TypingIndicator
    proto: ipc # Box change - Swaps out the silicon indicator proto for the IPC one
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTypeTrigger
          damageType: Blunt
          damage: 400
        behaviors:
          - !type:GibBehavior { }
      # Start Box change to make IPCs able to have ashing like behavior
      - trigger:
          !type:DamageTypeTrigger
          damageType: Heat
          damage: 2000 # Metal is normally harder to melt than a person, so "ashing" threshold is higher
        behaviors:
        - !type:SpawnEntitiesBehavior
          spawnInContainer: true
          spawn:
            MoltenIPCScrap:
              min: 1
              max: 1
        - !type:BurnBodyBehavior { } # TODO: Wait for the upstream PR that makes it so a custom popup can be made
        - !type:PlaySoundBehavior
          sound:
            collection: MeatLaserImpact # Either this sound doesn't appear, or it already works good enough
      # End Box change
  - type: SlowOnDamage
    speedModifierThresholds:
      60: 0.7
      80: 0.5 # DeltaV - was 90
      100: 0.3 # DeltaV - was 120, which is irrelvant?
  - type: SiliconDownOnDead
  - type: Speech
  - type: Deathgasp
    prototype: SiliconDeathgasp
  - type: Inventory
    templateId: ipc
  - type: GuideHelp
    guides:
      - IPC
  - type: Silicon
    entityType: enum.SiliconType.Player
    batteryPowered: true
    drainPerSecond: 0.6 # DeltaV change from 1.5 # Box Change - 1.3 > 0.6
    idleDrainReduction: 0.9 # TheDen - 60% less power usage while idling, for IPC Dynamic Power Draw - Box Change 0.6 --> 0.9
    chargeThresholdMid: 0.80
    chargeThresholdLow: 0.35
    chargeThresholdCritical: 0.10
    speedModifierThresholds:
      4: 1
      3: 1
      2: 0.80
      1: 0.45
      0: 0.2 # Box Change - Allow batteryless IPCs to crawl
  - type: BatteryDrinker
  # Box Change Start - Comments out intrinsic radio
  # - type: EncryptionKeyHolder
    # keySlots: 4
    # examineWhileLocked: false
    # keysExtractionMethod: Cutting
    # keysUnlocked: false
  # - type: ActiveRadio
  # - type: IntrinsicRadioReceiver
  # - type: IntrinsicRadioTransmitter
  # Box Change End
  - type: DeadStartupButton
    sound:
      path: /Audio/_EE/Effects/Silicon/startup.ogg
# Erro de linter
#   - type: Wires
#     layoutId: IPC
  - type: EmitBuzzWhileDamaged
  - type: CanHostGuardian
  - type: WeldingHealable
  - type: CombatMode # DeltaV - let IPCs disarm
    canDisarm: true

- type: entity
  save: false
  name: Urist McPositronic
  parent: MobHumanDummy
  id: MobIPCDummy
  categories: [ HideSpawnMenu ] # Goobstation
  description: A dummy IPC meant to be used in character setup.
  components:
  - type: HumanoidAppearance
    species: IPC
  - type: Inventory
    templateId: ipc
