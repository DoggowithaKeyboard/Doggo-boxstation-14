- type: job
  id: HeadOfSecurity
  name: job-name-hos
  description: job-description-hos
  playTimeTracker: JobHeadOfSecurity
  requirements:
    - !type:RoleTimeRequirement
      role: JobWarden
      time: 6h # Harmony: 1h -> 3h # Box - 3h > 6h
    # Harmony start
      # Box Change Start - Uncomment Detective, set to 2hr
    - !type:RoleTimeRequirement
      role: JobDetective
      time: 2h #knowing how to use the tools is important
      # Box Change End
    # - !type:RoleTimeRequirement
    #   role: JobSecurityOfficer
    #   time: 18000 #5 hrs
    # Harmony end
    - !type:DepartmentTimeRequirement
      department: Security
      time: 10h
    - !type:OverallPlaytimeRequirement
      time: 15h # Harmony: 10h -> 12h # Box - 12h > 15h
  weight: 10
  startingGear: HoSGear
  icon: "JobIconHeadOfSecurity"
  supervisors: job-supervisors-captain
  canBeAntag: false
  access:
  - HeadOfSecurity
  - Command
  - Brig
  - Security
  - Armory
  - Maintenance
  - Service
  - External
  - Detective
  - Cryogenics
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff

- type: startingGear
  id: HoSGear
  equipment:
    eyes: ClothingEyesGlassesSecurity
    id: HoSPDA
    gloves: ClothingHandsGlovesCombat
    ears: ClothingHeadsetAltSecurity
    pocket1: WeaponDisabler
  storage:
    back:
    - Flash
    - MagazinePistol
    - WeaponPistolMk58

- type: chameleonOutfit
  id: HeadOfSecurityChameleonOutfit
  job: HeadOfSecurity
  hasMindShield: true
  equipment:
    mask: ClothingMaskGasSecurity
    neck: ClothingNeckCloakHos
