- type: job
  id: HeadOfPersonnel
  name: job-name-hop
  description: job-description-hop
  playTimeTracker: JobHeadOfPersonnel
  requirements:
    # Harmony start
      # Box Change Start - Uncomment, set to 2hr
    - !type:DepartmentTimeRequirement
      department: Engineering
      time: 2h
    - !type:DepartmentTimeRequirement
      department: Medical
      time: 2h
    - !type:DepartmentTimeRequirement
      department: Science
      time: 2h
    - !type:DepartmentTimeRequirement
      department: Security
      time: 2h
      # Box Change End
    - !type:DepartmentTimeRequirement
      department: Civilian
      time: 8h # Box Change - 4h -> 8h
  # Harmony end
    - !type:DepartmentTimeRequirement
      department: Command
      time: 2h # Harmony: 2.5h -> 4h # Box - 4h -> 2h
    # Box Change Start
    - !type:DepartmentTimeRequirement
      department: Cargo
      time: 2h
    - !type:DepartmentTimeRequirement
      department: Science
      time: 2h
    - !type:OverallPlaytimeRequirement
      time: 12h
    # Box Change End
  weight: 20
  startingGear: HoPGear
  icon: "JobIconHeadOfPersonnel"
  supervisors: job-supervisors-captain
  canBeAntag: false
  access:
  - Command
  - HeadOfPersonnel
  - Bar
  - Service
  - Maintenance
  - Janitor
  - Theatre
  - Kitchen
  - Chapel
  - Hydroponics
  - External
  - Cryogenics
  # I mean they'll give themselves the rest of the access levels *anyways*.
  # As of 15/03/23 they can't do that so here's MOST of the rest of the access levels.
  # Head level access that isn't their own was deliberately left out, get AA from the captain instead.
  - Chemistry
  - Engineering
  - Research
  - Detective
  - Salvage
  - Security
  - Brig
  - Lawyer
  - Cargo
  - Atmospherics
  - Medical
  special:
