#gun base
- type: entity
  parent: BaseItem
  id: BaseWeaponKineticSidearm  # Defined to remove wieldable and to give room for further differentiation from the PKA
  abstract: true
  components:
  - type: Sprite
    sprite: _Harmony/Objects/Weapons/Guns/Kinetic/kinetic_pistol.rsi
    state: icon
# Box Change Start - Resizes to be small L shape after changes to PKA on harmony.
#  - type: Item
#    size: Large
#    shape:
#    - 0,0,2,1
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
#Box Change End - New Size for LKR
#Box Change Start - Makes it a sidearm for consitency with other L shaped pistols
  - type: Tag
    tags:
    - Sidearm
#Box Change End - Makes it a sidearm for consitency with other L shaped pistols
  - type: Clothing
    sprite: _Harmony/Objects/Weapons/Guns/Kinetic/kinetic_pistol.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
    - Pocket
  - type: Gun
    fireRate: 0.5
    selectedMode: SemiAuto
    minAngle: 1
    maxAngle: 2
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/kinetic_accel.ogg
  - type: AmmoCounter
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AmmoVisuals.HasAmmo:
        empty-icon:
          True: { visible: False }
          False: { visible: True }
        #todo: add other 'empty' animations
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 0.75
    rechargeSound:
      path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
  - type: BasicEntityAmmoProvider
    proto: BulletKinetic
    capacity: 1
    count: 1
  - type: UseDelay
    delay: 1


#gun
- type: entity
  name: luxury kinetic revolver
  parent: [BaseWeaponKineticSidearm, BaseCargoContraband]
  id: WeaponKineticSidearmLuxury
  description: A retrofitted Pirate Revolver that fires low-damage kinetic bolts at a short range. Its internals are too compact, so it can't take any modkits.
