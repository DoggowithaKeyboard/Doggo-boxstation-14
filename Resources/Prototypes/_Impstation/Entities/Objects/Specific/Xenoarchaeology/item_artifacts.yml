- type: entity
  parent: BaseItem
  id: BaseOldXenoArtifactItem # Box Change - XenoArtifact > OldXenoArtifact
  name: natural alien artifact
  suffix: Imp # Box Change
  description: A strange handheld alien device.
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Specific/Xenoarchaeology/item_artifacts.rsi
    layers:
    - state: ano01
      map: [ "enum.ArtifactsVisualLayers.Base" ]
    - state: ano01_on
      map: [ "enum.ArtifactsVisualLayers.UnlockingEffect" ]
      visible: false
  - type: Damageable
  - type: Physics
    bodyType: Dynamic
  - type: CollisionWake
    enabled: false
  - type: InteractionOutline
  - type: Reactive
    groups:
      Acidic: [Touch]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - ItemMask
        layer:
        - Opaque
        restitution: 0.3  # fite me
        friction: 0.2
  - type: Artifact
  - type: RandomArtifactSprite
    maxSprite: 11
    activationTime: 2.4
  - type: RandomSprite
    available:
    - enum.ArtifactsVisualLayers.UnlockingEffect:
        ano01_on: Rainbow
  - type: UserInterface #needs to be here for certain effects
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.TransferAmountUiKey.Key:
        type: TransferAmountBoundUserInterface
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface
      enum.IntercomUiKey.Key:
        type: IntercomBoundUserInterface
  - type: Appearance
  - type: Item
    size: Normal
    sprite: Objects/Specific/Xenoarchaeology/item_artifacts.rsi
    heldPrefix: ano01
  - type: Actions
  - type: Construction
    graph: OldArtifact
    node: done
  - type: GuideHelp
    guides:
    - Xenoarchaeology
  # - type: WarpPoint
  #   blacklist:
  #     tags:
  #     - GhostOnlyWarp
  # - type: Tag
  #   tags:
  #   - GhostOnlyWarp
  - type: NameIdentifier
    group: Artifact


- type: entity
  parent: BaseOldXenoArtifactItem # Box Change - XenoArtifact > OldXenoArtifact
  id: SimpleOldXenoArtifactItem # Box Change - XenoArtifact > OldXenoArtifact
  suffix: Simple, Imp # Box Change - Add Imp Suffix
  components:
  - type: Artifact
    nodesMin: 3
    nodesMax: 6

- type: entity
  parent: BaseOldXenoArtifactItem # Box Change - XenoArtifact > OldXenoArtifact
  id: MediumOldXenoArtifactItem # Box Change - XenoArtifact > OldXenoArtifact
  suffix: Medium, Imp # Box Change - Add Imp Suffix
  components:
  - type: Artifact
    nodesMin: 7
    nodesMax: 11

- type: entity
  parent: BaseOldXenoArtifactItem # Box Change - XenoArtifact > OldXenoArtifact
  id: ComplexOldXenoArtifactItem # Box Change - XenoArtifact > OldXenoArtifact
  suffix: Complex, Imp # Box Change - Add Imp Suffix
  components:
  - type: Artifact
    nodesMin: 12
    nodesMax: 16

# this exists for crafting item artifacts so that the final result can be simple, medium, or complex.
- type: entity
  parent: BaseOldXenoArtifactItem # Box Change - XenoArtifact > OldXenoArtifact
  id: VariedOldXenoArtifactItem # Box Change - XenoArtifact > OldXenoArtifact
  suffix: Varied, Imp # Box Change - Add Imp Suffix
  components:
  - type: Artifact
    nodesMin: 3
    nodesMax: 16
