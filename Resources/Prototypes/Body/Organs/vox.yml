- type: entity
  id: OrganVoxLungs
  parent: OrganHumanLungs
  description: "The blue, anaerobic lungs of a vox, they intake nitrogen to breathe. Any form of gaseous oxygen is lethally toxic if breathed in."
  suffix: "vox"
  components:
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
  - type: Metabolizer
    metabolizerTypes: [ Vox, Synthetic ] # Box Change - Add Synthetic metabolizer type - Vox SynthChem
  - type: Lung
    alert: LowNitrogen
  - type: Item
    size: Small
    heldPrefix: lungs

- type: entity
  parent: OrganHumanStomach
  id: OrganVoxStomach
  name: stomach
  description: "A stomach that smells of ammonia."
  components:
  - type: Metabolizer #Skreeeee!
    metabolizerTypes: [Vox, Synthetic] # Box Change - Add Synthetic metabolizer type - Vox SynthChem
  - type: Stomach
#Bird vs tags
    specialDigestible:
      tags:
      - Trash
    isSpecialDigestibleExclusive: false
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi

