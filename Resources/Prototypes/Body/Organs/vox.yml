- type: entity
  parent: BaseHumanOrgan # Box Change - OrganHumanKidneys > BaseHumanOrgan - SynthChem
  id: OrganVoxKidneys
  name: kidney
  description: "Smells flammable."
  components:
  - type: Metabolizer
    maxReagents: 5 # Box Change - SynthChem
    metabolizerTypes: [Vox, Synthetic] # Box Change - Add Synthetic metabolizer type - Vox SynthChem
    removeEmpty: true # Box Change - SynthChem
  - type: Sprite
    sprite: Mobs/Species/Vox/organs.rsi
  # Box Change Start - SynthChem
  - type: Sprite
    layers:
      - state: kidney-l
      - state: kidney-r
  - type: Item
    size: Small
    heldPrefix: kidneys
  # Box Change End

