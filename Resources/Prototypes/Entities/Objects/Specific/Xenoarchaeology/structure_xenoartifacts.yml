- type: entity
  # Box Change Start - Imp Duo XenoArch
  parent: [BaseStructureDynamic, BaseXAEXenoArtifact] # XenoArtifact > XAEXenoartifact
  id: BaseXAEXenoArtifactStructure # XenoArtifact > XAEXenoartifact
  name: reticulated artifact # adds "reticulated" to the name
  suffix: Imp # Add Imp Suffix
  # Box Change End
  abstract: true
  noSpawn: true
  components:
  # Visual
  - type: Sprite
    drawdepth: SmallObjects
    sprite: Objects/Specific/Xenoarchaeology/xeno_artifacts.rsi
    noRot: true
    layers:
    - state: ano30
      map: [ "enum.ArtifactsVisualLayers.Base" ]
    - state: ano30_on
      map: [ "enum.ArtifactsVisualLayers.UnlockingEffect" ]
      visible: false
    - state: artifact-activation
      map: [ "enum.ArtifactsVisualLayers.ActivationEffect" ]
      visible: false
  - type: RandomArtifactSprite
    maxSprite: 36
  - type: RandomSprite
    available:
    - enum.ArtifactsVisualLayers.UnlockingEffect:
        ano01_on: Rainbow
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 75
        layer: # doesn't collide with artifact storage
        - Opaque
        mask:
        - MachineMask
  #Box Change Start -  Imp - Adds ghostonly tag to prevent wizard TP
  - type: Tag
    tags:
    - GhostOnlyWarp
    - Structure
  #Box Change End -  Imp - Adds ghostonly tag to prevent wizard TP

- type: entity
  parent: BaseXAEXenoArtifactStructure # Box Change - XenoArtifact > XAEXenoartifact - Imp Duo XenoArch
  id: ComplexXAEXenoArtifact # Box Change - XenoArtifact > XAEXenoartifact - Imp Duo XenoArch
  components:
  - type: XenoArtifact
    nodeCount:
      min: 9
      max: 13

