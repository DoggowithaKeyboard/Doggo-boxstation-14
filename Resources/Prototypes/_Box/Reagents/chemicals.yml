- type: reagent
  id: IndustrialLubricant
  name: reagent-name-industrial-lubricant
  group: Synthetic
  desc: reagent-desc-industrial-lubricant
  physicalDesc: reagent-physical-desc-oily
  slipData:
    requiredSlipSpeed: 3.5
  flavor: oily
  flavorMinimum: 0.01
  color: "#7A8C63"
  recognizable: true
  boilingPoint: 300 # Oil, Close Enough
  meltingPoint: -16 # Oil, Close Enough
  friction: 0.4
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Vox]
          inverted: true
        factor: -0.2
      - !type:SatiateThirst
        factor: 1
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Vox]
      - !type:ModifyBloodLevel
        conditions:
        - !type:MetabolizerTypeCondition
          type: [IPC]
        amount: 3

- type: reagent
  id: ComputerCoolant
  name: reagent-name-computer-coolant
  group: Synthetic
  desc: reagent-desc-computer-coolant
  physicalDesc: reagent-physical-desc-translucent
  slipData:
    requiredSlipSpeed: 4
  flavor: sweet
  flavorMinimum: 0.01
  color: "#D9EAFB"
  boilingPoint: 100 # Water, Close enough
  meltingPoint: -30 # Freezing point of some Glycol-Water Compter Coolants
  friction: 0.4
  metabolisms:
    Drink:
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Synthetic]
          inverted: true
        damage:
          types:
            Poison: 0.5
      - !type:ModifyBloodLevel
        conditions:
        - !type:MetabolizerTypeCondition
          type: [IPC]
        amount: 3
      - !type:SatiateThirst
        factor: 1
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Vox]

- type: reagent
