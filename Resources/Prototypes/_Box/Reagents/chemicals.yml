# Voltaic Acid - Synthetics/Silicon Component
- type: reagent
  id: VoltaicAcid
  name: reagent-name-voltaic-acid
  desc: reagent-desc-voltaic-acid
  physicalDesc: reagent-physical-desc-electric
  flavor: shocking
  color: "#FDD023"
  metabolisms:
    Poison:
      effects:
      - !type:Electrocute
        probability: 0.10
    Industrial:
      effects:
      - !type:Electrocute
        probability: 0.10
      - !type:HealthChange
        damage:
          types:
            Shock: 0.1

