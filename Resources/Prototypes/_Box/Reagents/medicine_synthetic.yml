# Thermal Paste - Temp Stabilizer
- type: reagent
  id: ThermalPaste
  name: reagent-name-thermal-paste
  group: Synthetic
  desc: reagent-desc-thermal-paste
  physicalDesc: reagent-physical-desc-thick-and-grainy
  flavor: bitter
  color: "#9CA2C6"
  metabolisms:
    Industrial:
      effects:
      - !type:HealthChange
        damage:
          types:
            Cold: -0.5
            Heat: -0.5
      - !type:AdjustTemperature
        conditions:
        - !type:Temperature
          max: 293.15
        amount: 100000 # thermal energy, not temperature!
      - !type:AdjustTemperature
        conditions:
        - !type:Temperature
          min: 293.15
        amount: -10000
      - !type:PopupMessage
        type: Local
        visualType: Medium
        messages: [ "leporazine-effect-temperature-adjusting" ]
        probability: 0.2
    Poison:
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Vox]
          inverted: true
        damage:
          types:
            Poison: 0.5
      - !type:ChemVomit
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Vox]
          inverted: true
        probability: 0.02
      - !type:SatiateHunger
        factor: 1
        conditions:
        - !type:MetabolizerTypeCondition
          type: [IPC]

