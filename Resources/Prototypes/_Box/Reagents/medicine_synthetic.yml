# Emergency defragmenter
- type: reagent
  id: EmergencyDefragmenter
  name: reagent-name-emergency-defragmenter
  group: Synthetic
  desc: reagent-desc-emergency-defragmenter
  physicalDesc: reagent-physical-desc-electric
  flavor: shocking
  color: "#bd00ff"
  metabolisms:
    Software:
      metabolismRate: 0.1
      effects:
      - !type:HealthChange
        damage:
          types:
            Data: -0.3
            Shock: 0.15
            Caustic: 0.15
            Slash: 0.5
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: EmergencyDefragmenter
          min: 11
        damage:
          types:
            Shock: 1

