# Polydimethylsiloxane
- type: reagent
  id: Polydimethylsiloxane
  name: reagent-name-polydimethylsiloxane
  group: Synthetic
  desc: reagent-desc-polydimethylsiloxane
  physicalDesc: reagent-physical-desc-syrupy
  flavor: sweet
  color: "#C4A484"
  metabolisms:
    Industrial:
      effects:
      - !type:ModifyBleedAmount
        amount: -1.5
      - !type:AdjustTemperature
        conditions:
        - !type:Temperature
          max: 423.15
        - !type:ReagentThreshold
          min: 15
        amount: 50000
    Poison:
      effects:
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Synthetic]
          inverted: true
        damage:
          types:
            Poison: 0.5
      - !type:ChemVomit
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Synthetic]
          inverted: true
        probability: 0.02
      - !type:SatiateThirst
        factor: 1
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Synthetic]

# Overclocker
- type: reagent
  id: Overclocker
  name: reagent-name-overclocker
  group: Synthetic
  desc: reagent-desc-overclocker
  physicalDesc: reagent-physical-desc-electric
  flavor: shocking
  color: "#E40605"
  metabolisms:
    Software:
      effects:
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Overclocker
          min: 0
          max: 15
        - !type:TotalDamage
          min: 80
        damage:
          types:
            Heat: -3
            Blunt: -1
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Overclocker
          min: 15
        damage:
          types:
            Shock: 3
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStunned
        time: 0.75
        type: Remove
      - !type:ModifyKnockdown
        time: 0.75
        type: Remove
      - !type:GenericStatusEffect
        key: Adrenaline # Guess what epinephrine is...
        component: IgnoreSlowOnDamage
        time: 5 # lingers less than hivemind reagent to give it a niche

