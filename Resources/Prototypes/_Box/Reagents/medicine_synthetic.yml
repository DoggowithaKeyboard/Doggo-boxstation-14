# Nanoweldite - Discount Omni for brutes, hard but possible to make
- type: reagent
  id: Nanoweldite
  name: reagent-name-nanoweldite
  parent: BasePyrotechnic
  group: Synthetic
  desc: reagent-desc-nanoweldite
  physicalDesc: reagent-physical-desc-metallic
  flavor: metallic
  color: "#B18E7D"
  tileReactions:
  - !type:FlammableTileReaction {}
  metabolisms:
    Industrial:
      effects:
      - !type:HealthChange
        damage:
          types:
            Slash: -2
            Piercing: -2
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Nanoweldite
          min: 11.5
        damage:
          types:
            Heat: 1
    Poison:
      effects:
      - !type:SatiateThirst
        factor: 0.5
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Vox]
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Synthetic]
          inverted: true
        damage:
          types:
            Poison: 0.5
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Synthetic]
          inverted: true
        damage:
          types:
            Heat: 0.5
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Nanoweldite
          min: 11.5
        - !type:MetabolizerTypeCondition
          type: [Synthetic]
        damage:
          types:
            Heat: 1.5
            Poison: 0.5
      - !type:FlammableReaction
        multiplier: 0.4

# SOI Sapphire - Radiation Protection ("Silicon on Insulator Sapphire", used to shield components from radiation)
- type: reagent
  id: SOISapphire
  name: reagent-name-soi-sapphire
  group: Synthetic
  desc: reagent-desc-soi-sapphire
  physicalDesc: reagent-physical-desc-shiny
  flavor: metallic
  color: "#0f52ba"
  metabolisms:
    Industrial:
      effects:
      - !type:GenericStatusEffect
        key: RadiationProtection
        component: RadiationProtection
        time: 2
        type: Add
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: SOISapphire
          min: 20
        damage:
          types:
            Shock: 1
    Poison:
      effects:
        - !type:HealthChange
          damage:
            types:
              Poison: 0.1
              Slash: 0.1 # Getting sapphire deposited inside you will probably cut you up
        - !type:HealthChange
          conditions:
        - !type:ReagentCondition
          reagent: SOISapphire
          min: 9.5
        - !type:MetabolizerTypeCondition
          type: [Synthetic]
          inverted: true
          damage:
            types:
              Poison: 0.1
              Slash: 0.1
              Shock: 1

