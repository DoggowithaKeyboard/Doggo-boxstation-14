- type: entity
  parent: OrganHumanBrain
  id: OrganVoxBrain
  name: cortical stack
  components:
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [Vox, Synthetic]
    groups:
    - id: Software
    - id: Malware

- type: entity
  id: OrganVoxKidneys
  parent: BaseHumanOrgan
  name: kidneys
  suffix: "vox"
  description: "Filters toxins from the bloodstream."
  components:
  - type: Sprite
    layers:
      - state: kidney-l
      - state: kidney-r
  - type: Item
    size: Small
    heldPrefix: kidneys
  # The kidneys just remove anything that doesn't currently have any metabolisms, as a stopgap.
  - type: Metabolizer
    maxReagents: 5
    metabolizerTypes: [Vox]
    removeEmpty: true
